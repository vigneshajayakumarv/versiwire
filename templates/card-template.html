<!doctype html><html lang="en"><head><meta charset="utf-8"><style>@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap');:root{--ink:#0B1416;--panel:#0F1E21;--signal:#2BD4BE;--wire:#3C5C5A;--paper:#EAF4F2;--dim:#8AA6A2;--amber:#F5A623}*{margin:0;padding:0;box-sizing:border-box}html,body{width:1080px;height:1080px}body{background:var(--ink);color:var(--paper);font-family:'Space Grotesk',sans-serif;position:relative;overflow:hidden}.glow{position:absolute;width:900px;height:900px;left:-120px;top:180px;background:radial-gradient(circle at center,rgba(43,212,190,0.14),transparent 62%);filter:blur(10px);pointer-events:none}.scan{position:absolute;inset:0;background:repeating-linear-gradient(to bottom,rgba(255,255,255,0.014) 0px,rgba(255,255,255,0.014) 1px,transparent 1px,transparent 4px);pointer-events:none}.card{position:relative;width:100%;height:100%;padding:84px 88px;display:flex;flex-direction:column}.masthead{display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:16px;font-family:'Space Mono',monospace;font-weight:700;font-size:23px;letter-spacing:0.22em;color:var(--paper)}.pulse{width:13px;height:13px;border-radius:50%;background:var(--signal);box-shadow:0 0 0 5px rgba(43,212,190,0.18),0 0 22px rgba(43,212,190,0.9)}.brand .tick{color:var(--signal)}.monogram{width:60px;height:60px;border:2px solid var(--wire);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:30px;color:var(--signal)}.signal-line{height:2px;background:linear-gradient(to right,var(--signal) 0%,var(--signal) 22%,var(--wire) 22%,var(--wire) 100%);margin-top:26px}.body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 0}.category{font-family:'Space Mono',monospace;font-weight:700;font-size:26px;letter-spacing:0.18em;color:var(--signal);margin-bottom:26px;text-transform:uppercase}.headline{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:78px;line-height:1.04;letter-spacing:-0.015em;color:var(--paper);display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}.foot-line{height:1px;background:var(--wire);margin-bottom:24px}.foot{display:flex;align-items:center;justify-content:space-between;font-family:'Space Mono',monospace;font-size:22px;letter-spacing:0.08em;color:var(--dim)}.foot .src{color:var(--paper)}.foot .src b{color:var(--signal);font-weight:700}.verified{display:flex;align-items:center;gap:9px;color:var(--amber);font-weight:700;letter-spacing:0.14em}.verified .dot{width:9px;height:9px;border-radius:50%;background:var(--amber);box-shadow:0 0 12px rgba(245,166,35,0.8)}</style></head><body><div class="glow"></div><div class="scan"></div><div class="card"><div class="masthead"><div class="brand"><span class="pulse"></span>VERSIWIRE<span class="tick">&#9656;</span>TECH DISPATCH</div><div class="monogram">V</div></div><div class="signal-line"></div><div class="body"><div class="category">{{ $json.category }}</div><div class="headline">{{ $json.headline }}</div></div><div class="foot-line"></div><div class="foot"><div class="src">SOURCE: <b>{{ $json.sources.join(' & ') }}</b></div><div class="verified"><span class="dot"></span>VERIFIED</div><div class="date">{{ $now.format('yyyy·MM·dd') }}</div></div></div></body></html>
